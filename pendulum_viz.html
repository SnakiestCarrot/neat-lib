,[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791],[-3.03902,2.83791]];
const L1 = 1;
const L2 = 1;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const status = document.getElementById('status');
const playBtn    = document.getElementById('playBtn');
const resetBtn   = document.getElementById('resetBtn');
const speedSlider = document.getElementById('speed');

const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2;
const scale = Math.min(W, H) * 0.35 / (L1 + L2);

let frame = 0, playing = false, animId = null;

// Trail buffer
const TRAIL_LEN = 40;
const trail = [];

function draw() {
    ctx.fillStyle = '#1a1b26';
    ctx.fillRect(0, 0, W, H);

    const [t1, t2] = DATA[frame];

    // Pivot is at centre; angles from downward vertical.
    // Screen y increases downward, so y-offset = cos(θ) * L * scale.
    const px1 = cx + Math.sin(t1) * L1 * scale;
    const py1 = cy + Math.cos(t1) * L1 * scale;
    const px2 = px1 + Math.sin(t2) * L2 * scale;
    const py2 = py1 + Math.cos(t2) * L2 * scale;

    // Update tip trail
    trail.push([px2, py2]);
    if (trail.length > TRAIL_LEN) trail.shift();

    // Upright guide (dashed)
    ctx.strokeStyle = '#2a2b3a';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(cx, cy - (L1 + L2) * scale - 20);
    ctx.lineTo(cx, cy);
    ctx.stroke();
    ctx.setLineDash([]);

    // Tip trail
    for (let i = 1; i < trail.length; ++i) {
        const alpha = i / trail.length;
        ctx.strokeStyle = `rgba(247,118,142,${alpha * 0.6})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(trail[i-1][0], trail[i-1][1]);
        ctx.lineTo(trail[i][0],   trail[i][1]);
        ctx.stroke();
    }

    // Link 1
    ctx.strokeStyle = '#7aa2f7';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px1, py1);
    ctx.stroke();

    // Link 2
    ctx.strokeStyle = '#e0af68';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(px1, py1);
    ctx.lineTo(px2, py2);
    ctx.stroke();

    // Joints
    for (const [jx, jy, r, col] of [
            [cx,  cy,  8, '#565f89'],
            [px1, py1, 5, '#c0caf5'],
            [px2, py2, 4, '#f7768e']]) {
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(jx, jy, r, 0, Math.PI * 2);
        ctx.fill();
    }

    const deg = v => (v * 180 / Math.PI).toFixed(1);
    status.textContent =
        `Frame ${frame} / ${DATA.length-1}  |  θ₁: ${deg(t1)}°  θ₂: ${deg(t2)}°`;
}

function tick() {
    if (!playing) return;
    frame = Math.min(frame + parseInt(speedSlider.value), DATA.length - 1);
    draw();
    if (frame >= DATA.length - 1) { playing = false; playBtn.textContent = 'Play'; }
    else animId = requestAnimationFrame(tick);
}

playBtn.addEventListener('click', () => {
    if (playing) {
        playing = false; playBtn.textContent = 'Play'; cancelAnimationFrame(animId);
    } else {
        if (frame >= DATA.length - 1) { frame = 0; trail.length = 0; }
        playing = true; playBtn.textContent = 'Pause'; tick();
    }
});

resetBtn.addEventListener('click', () => {
    playing = false; playBtn.textContent = 'Play';
    cancelAnimationFrame(animId);
    frame = 0; trail.length = 0; draw();
});

draw();
</script>
